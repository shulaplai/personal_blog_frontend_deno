<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <meta name="description" content="Personal Blog & Portfolio" />
    <meta name="theme-color" content="#FCFCFD" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0B10" media="(prefers-color-scheme: dark)" />
    <title>Personal Blog</title>
    <script>
      (function(){var t=localStorage.getItem('dark_mode');var d=t==='true'||(t===null&&window.matchMedia('(prefers-color-scheme:dark)').matches);if(d){document.documentElement.classList.add('dark')}var m=document.querySelector('meta[name="theme-color"]');if(m){m.setAttribute('content',d?'#0B0B10':'#FCFCFD')}})()
    </script>
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preload" href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" as="style" />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&display=swap"
    />
  </head>
