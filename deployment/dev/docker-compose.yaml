version: '3.9'
services:
  frontend:
    restart: always
    build:
      context: ../../.
      dockerfile: ./deployment/dev/Dockerfile
    image: personal-blog-frontend-dev:latest
    container_name: personal-blog-frontend-dev
    networks:
      - app-net
    ports:
      - '9080:443'
networks:
  app-net:
    name: 'personal-blog-net-dev'
